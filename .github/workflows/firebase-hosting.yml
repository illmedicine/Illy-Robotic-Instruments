name: Deploy to Firebase Hosting

# Token-based deploy (no service account). Requires a repo secret FIREBASE_TOKEN
# generated locally with:  firebase login:ci
on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: firebase-hosting
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout apex site
        uses: actions/checkout@v4

      - name: Checkout IllySocial (latest main)
        uses: actions/checkout@v4
        with:
          repository: illmedicine/illysocialV2
          ref: main
          path: _illysocial

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: _illysocial/Frontend/package-lock.json

      - name: Build IllySocial for /isocial
        working-directory: _illysocial/Frontend
        run: |
          npm ci
          npx vite build --base=/isocial/

      - name: Copy IllySocial into the deploy tree (site-next/public/isocial)
        run: |
          rm -rf site-next/public/isocial
          mkdir -p site-next/public/isocial
          cp -a _illysocial/Frontend/dist/. site-next/public/isocial/

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting --project isocial-e5297 --non-interactive
