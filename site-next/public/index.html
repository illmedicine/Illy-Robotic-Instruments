  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1629 100%);
      color: #e0e6ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    .logo-ring {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px solid #64c8ff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      box-shadow: 0 0 40px rgba(100, 200, 255, 0.3), 0 0 80px rgba(0, 255, 136, 0.1);
      animation: pulse 4s ease-in-out infinite;
      overflow: hidden;
    }
    .logo-ring img {
      width: 85%;
      height: 85%;
      object-fit: contain;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(100, 200, 255, 0.3), 0 0 80px rgba(0, 255, 136, 0.1); }
      50% { box-shadow: 0 0 60px rgba(100, 200, 255, 0.5), 0 0 120px rgba(0, 255, 136, 0.2); }
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    h2 {
      font-size: 1.2rem;
      color: #00ff88;
      letter-spacing: 0.3em;
      margin-bottom: 2rem;
    }
    .message {
      font-size: 1.1rem;
      color: #a0b0d0;
      line-height: 1.8;
      margin-bottom: 2rem;
    }
    .status {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      border: 1px solid rgba(100, 200, 255, 0.3);
      border-radius: 999px;
      color: #64c8ff;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
    }
    .bg-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(100, 200, 255, 0.08) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse 8s ease-in-out infinite;
